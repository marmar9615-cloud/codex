[package]
edition = "2021"
name = "bm25"
version = "2.3.2"
authors = ["Michael <michael@ramyun.co.uk>"]
build = false
exclude = [
    ".github/**",
    "/snapshots/**",
    "/data/**",
]
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "BM25 embedder, scorer, and search engine"
readme = "README.md"
keywords = [
    "bm25",
    "sparse",
    "embed",
    "search",
    "nlp",
]
categories = [
    "algorithms",
    "text-processing",
]
license = "MIT"
repository = "https://github.com/Michael-JB/bm25"

[package.metadata.docs.rs]
all-features = true

[features]
default = ["default_tokenizer"]
default_tokenizer = [
    "dep:cached",
    "dep:stop-words",
    "dep:rust-stemmers",
    "dep:deunicode",
    "dep:unicode-segmentation",
]
