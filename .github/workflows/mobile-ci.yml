name: mobile-ci

on:
  pull_request:
    paths:
      - "apps/mobile/**"
      - "packages/mobile-protocol/**"
      - "services/mobile-runner/**"
      - "docs/mobile/**"
      - "scripts/mobile-*.mjs"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/mobile-ci.yml"
  push:
    branches:
      - main
    paths:
      - "apps/mobile/**"
      - "packages/mobile-protocol/**"
      - "services/mobile-runner/**"
      - "docs/mobile/**"
      - "scripts/mobile-*.mjs"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/mobile-ci.yml"
  workflow_dispatch:

jobs:
  mobile:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup pnpm
        uses: pnpm/action-setup@a8198c4bff370c8506180b035930dea56dbd5288 # v5
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run mobile QA gate
        run: pnpm test:mobile:all
