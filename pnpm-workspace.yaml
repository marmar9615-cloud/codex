packages:
  - apps/mobile
  - codex-cli
  - packages/*
  - codex-rs/responses-api-proxy/npm
  - sdk/typescript
  - services/*

ignoredBuiltDependencies:
  - esbuild

minimumReleaseAge: 10080
minimumReleaseAgeExclude: []

blockExoticSubdeps: true
strictDepBuilds: true
trustPolicy: no-downgrade
trustPolicyIgnoreAfter: 10080
trustPolicyExclude: []
allowBuilds: {}
